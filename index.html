<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="todo-card" aria-labelledby="todo-title">
            <p class="eyebrow">Simple planner</p>
            <h1 id="todo-title">Todo List</h1>
            <form class="todo-form" id="todo-form">
                <label class="sr-only" for="todo-input">Add a todo</label>
                <input
                    id="todo-input"
                    name="todo"
                    type="text"
                    placeholder="Add a task"
                    autocomplete="off"
                    maxlength="120"
                    required
                >
                <button type="submit">Add</button>
            </form>
            <ul class="todo-list" id="todo-list" aria-live="polite"></ul>
            <p class="empty-state" id="empty-state">No todos yet. Add your first one above.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
